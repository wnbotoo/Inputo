<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Inputo composer preview</title>
  <desc id="desc">A preview of the Inputo floating composer with draft text, transform controls, and generated output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18212a"/>
      <stop offset="0.55" stop-color="#26323c"/>
      <stop offset="1" stop-color="#122b2a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="64" y="56" width="1152" height="608" rx="28" fill="#f5f7f8" opacity="0.06"/>

  <g filter="url(#shadow)">
    <rect x="190" y="116" width="900" height="488" rx="18" fill="#101820" stroke="#d9f7f2" stroke-opacity="0.18"/>
    <rect x="190" y="116" width="900" height="46" rx="18" fill="#17232c"/>
    <rect x="190" y="144" width="900" height="18" fill="#17232c"/>
    <circle cx="224" cy="139" r="6" fill="#ff6b5f"/>
    <circle cx="246" cy="139" r="6" fill="#f3c25b"/>
    <circle cx="268" cy="139" r="6" fill="#55c77a"/>
    <text x="640" y="145" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="14" font-weight="650" fill="#d7e4e8">Inputo</text>

    <rect x="222" y="190" width="836" height="146" rx="12" fill="#ffffff" fill-opacity="0.075" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="246" y="222" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="16" font-weight="700" fill="#eef7f8">Preview</text>
    <rect x="970" y="202" width="64" height="28" rx="8" fill="none" stroke="#eaf7f5" stroke-opacity="0.42"/>
    <text x="1002" y="221" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="13" font-weight="650" fill="#eef7f8">Copy</text>
    <text x="246" y="264" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="17" fill="#dce9eb">Web composer bridge tests are now passing, the clipboard flow is stricter,</text>
    <text x="246" y="292" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="17" fill="#dce9eb">and the privacy boundary is documented for the first open-source release.</text>

    <rect x="222" y="352" width="836" height="48" rx="12" fill="#ffffff" fill-opacity="0.075" stroke="#ffffff" stroke-opacity="0.16"/>
    <rect x="238" y="362" width="144" height="28" rx="8" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="260" y="381" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="13" fill="#f0faf9">Polish</text>
    <path d="M350 372 l7 7 l7 -7" fill="none" stroke="#d6e6e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="396" y="362" width="642" height="28" rx="8" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="416" y="381" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="13" fill="#dce9eb">Make it calm and concise</text>

    <rect x="222" y="416" width="836" height="156" rx="12" fill="#ffffff" fill-opacity="0.075" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="246" y="455" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="17" fill="#eaf4f5">Turn this rough note into a concise status update:</text>
    <text x="246" y="494" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="17" fill="#cbd9dc">Finished the Web composer bridge tests, tightened the clipboard flow,</text>
    <text x="246" y="522" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="17" fill="#cbd9dc">and documented the privacy boundary for the first open-source release.</text>
    <text x="246" y="551" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="13" fill="#9fb4b8">Ready to copy.</text>
    <rect x="838" y="532" width="72" height="28" rx="8" fill="none" stroke="#eaf7f5" stroke-opacity="0.28"/>
    <text x="874" y="551" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="13" font-weight="650" fill="#d9e6e8">Clear</text>
    <rect x="924" y="532" width="104" height="28" rx="8" fill="#2dd4bf"/>
    <text x="976" y="551" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="13" font-weight="700" fill="#061311">Generate</text>
  </g>

  <text x="640" y="646" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="15" fill="#c4d8d9" opacity="0.82">Local composer. Native credentials. Explicit clipboard action.</text>
</svg>
