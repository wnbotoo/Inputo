name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-composer:
    name: WebComposer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WebComposer
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: WebComposer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify WebComposer
        run: npm run verify

  macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Swift package tests
        run: swift test --package-path InputoModules

      - name: Build Inputo
        run: xcodebuild -project Inputo.xcodeproj -scheme Inputo -configuration Debug -derivedDataPath .build/XcodeDerivedData CODE_SIGNING_ALLOWED=NO build
