name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-composer:
    name: WebComposer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/web-composer
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: packages/web-composer/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Print toolchain versions
        run: |
          node --version
          pnpm --version

      - name: Verify WebComposer
        run: pnpm run verify

  macos:
    name: macOS app
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run Swift package tests
        run: swift test --package-path apps/macos/InputoModules

      - name: Build Inputo
        run: xcodebuild -project apps/macos/Inputo.xcodeproj -scheme Inputo -configuration Debug -derivedDataPath .build/XcodeDerivedData CODE_SIGNING_ALLOWED=NO build
